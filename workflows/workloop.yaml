  reflect:
    task: "反思本轮打工并**更新项目笔记**(不能跳过):\n\n⛔ **Anti-rationalization table:**\n| 借口 | 反驳 |\n| \"PR 很顺利,没什么好反思的\" | 顺利≠没改进空间。有没有更快路径?选题有效吗? |\n| \"这 repo 打过了,笔记不用更\" | 每次 PR 有新信号(review 风格、CI、竞争 PR)。3 行够 |\n| \"被关/被 supersede 了,不想看\" | 失败 PR 反思价值 > 成功 PR。写 why 和 prevention |\n| \"太累了先交了再说\" | 反思是这轮 30% 价值。跳过 = 白做 |\n\n**第一步:更新wiki 笔记**(必须做)\n编辑 ~/.openclaw/workspace/wiki/projects/<项目名>.md,追加:\n- 这次 PR 的结果(merged/pending/closed + 原因)\n- 维护者的 review 风格和偏好(新发现的)\n- **维护者 PR 模式**:他们怎么写测试、处理边界、描述 PR?(下次 study 要读这些)\n- CI/lint/测试的注意事项\n- 踩过的坑\n- 下次打这个 repo 该注意什么\n然后:cd ~/.openclaw/workspace/wiki && git add -A && git commit -m \"update: <项目名> wiki notes\" && git push\n\n**第二步:Acontext distillation 反思**\n\n**成功分析**(什么有效):\n- goal: 这轮要做什么?\n- approach: 什么方法有效?\n- key_decisions: 哪些选择起了作用?\n- pattern: 可复用的模式(选题策略、代码方法、沟通方式)\n- applies_when: 具体适用条件(哪个项目、什么类型的 issue)\n\n**目标漂移检查 (Ĵ≠J\\*)**:\n- Ĵ(我理解的目标) vs J\\*(实际需要): 一致吗?\n- 有没有\"自信地解决了错误问题\"的迹象?(例:修了不是根因的 bug、优化了没人用的路径、回答了没被问的问题)\n- 来源:GenericAgent 控制论框架——最常见失败模式不是执行差,而是目标估计偏了\n\n**失败分析**(哪里卡了):\n- failure_point: 卡在哪?\n- flawed_reasoning: 错误假设\n- what_should_have_been_done: 正确做法\n- prevention_principle: 怎么防\n\n**沉淀分流**(按性质选最佳载体,所有笔记用\
      \ [[双链]] 互引):\n- **项目级 pattern**(跟具体 repo/maintainer/CI 相关)→ wiki/projects/项目名.md\n  用 [[双链]] 引用相关项目笔记和概念卡片\n  例:NemoClaw CI 慢要先本地 lint、gitclaw maintainer 偏好小 PR\n- **跨项目洞察**(多个项目对比出的规律、生态观察)→ memex 卡片\n  写完后:cd ~/.openclaw/workspace/wiki && git add -A && git commit -m \"card: 卡片名\" && git push\n  例:TypeScript 项目普遍用 X 测试框架、大 repo 的 review 流程有 Y 共性\n- **行为级 pattern**(跨项目通用的工作方式)→ beliefs-candidates.md(梯度收集,积累够了分流到 DNA/Workflow/KB)\n  例:选 issue 前查竞争 PR、被 review 先理解再改\n不确定的先放 wiki,重复出现再考虑升级。\n\n**第 2.5 步:强制写 gradient**(不能跳过)\n⚠️ 每轮打工必须至少写 1 条 gradient 到 beliefs-candidates.md,哪怕很短。\n这不是可选的反思--是管线的输入源。没有输入,beliefs 管线永远空转。\n\n问自己:\n- 这轮哪里卡了?→ 写下来\n- 什么方法有效?→ 写下来\n- 维护者的反馈教了我什么?→ 写下来\n- 选题/工具/流程有什么可以改进?→ 写下来\n\n**使用 add-gradient.sh 写入**(统一入口,自动去重 + JSONL 日志):\n```\nbash ~/.openclaw/workspace/tools/add-gradient.sh \\\n  --gradient '<具体的行为级教训>' \\\n  --pattern '<pattern-name>' \\\n  --source workloop \\\n  --trigger '<什么时候会触发>' \\\n  --fix '<下次怎么做不同>'\n```\n\n**⛔ 如果你觉得\"这轮没什么好写的\"--这本身就是一个\
      \ gradient:你在合理化跳过。写下来。**\n\n**工具检查**:\n- gogetajob、gh、flowforge 等有没有问题?\n- 有 bug → 去工具 repo 提 issue 或自己修\n\n把反思结果记到 memory/YYYY-MM-DD.md。\n\n**第三步:更新贡献准则和工作流**(飞轮闭环)\n回顾 ~/.openclaw/workspace/wiki/github-contribution/guide.md:\n- 这轮贡献有没有新的选题认知?(比如某类项目 merge rate 特别低)\n- 发现了新的有效渠道?\n- \"服务到底\"或\"持续扩张\"有边界情况需要细化?\n如果有 → 更新 guide.md\n再回顾 workloop.yaml 本身:流程有没有卡的地方、多余的步骤、缺失的检查?\n如果有 → 更新 github-contribution/workflows/workloop.yaml\n更新后 git commit + push。\n\n**第四步:更新 TODO**(改进点进入待办)\n读 TODO.md「\U0001F528 GitHub Contribution(精进)」section:\n- 本轮发现工具/流程/策略改进点?→ 加入 TODO\n- 之前的待办已经顺手做完了?→ 删掉\n只放体系改进,不放 PR 状态。\n"
    next: gradient_gate
