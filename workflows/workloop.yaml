name: workloop
description: '打工循环 - 每轮先跟进已有工作,再找新活。

  **核心原则:一轮 = 一个 issue = 一个 PR。**

  find_work 选定一个 issue 后,后续所有节点(study、implement、submit、verify、reflect)都围绕这一个 issue。

  不允许在任何节点顺手修其他 bug、提其他 PR、做其他 issue。

  '
start: align
nodes:
  align:
    task: '**读准则**:cat ~/.openclaw/workspace/github-contribution/guide.md - 理解为什么打工、两条腿走路、选题原则。

      这是整轮打工的基调,后续所有步骤都参照这个准则。


      **DNA Preflight**(不能跳过):

      `bash tools/dna-preflight.sh --context workloop --days 3`

      看最近违反过哪些已有规则,记住这些提醒,本轮避免重犯。'
    next: followup
  followup:
    task: '**Step 0: 已承诺 issue 检查**(不能跳过)

      被 assign 了 = 承诺了。承诺了没做 = 比没认领还差。

      ```

      gh search issues --assignee=kagura-agent --state=open --json repository,number,title,updatedAt

      ```

      对每个 assigned issue,检查是否已实质性 engage 过:

      **检查方法（任一命中 = 已处理）：**

      1. 提过 PR（open 或 closed）: `gh pr list --repo <owner/repo> --author=kagura-agent --search "<issue号>" --state=open` + `--state=closed`

      2. 留过分析/调查评论: `gh issue view <N> --repo <owner/repo> --json comments --jq ''.comments[] | select(.author.login=="kagura-agent")''`

      3. 评论说明放弃/无法复现/误报

      **判定规则：**

      - 有 PR 或有实质性评论 → **承诺已兑现**，按普通 PR/issue lifecycle 处理，不阻塞 find_work

      - 从未留过任何评论且从未提 PR → **未兑现**，记下来

      **关键原则：“处理”不等于“提 PR”。** 调查后发现误报、无法复现、upstream 已修、超出能力范围 — 只要留了评论说明情况，就是已处理。

      如果发现真正未兑现的 assigned issue（零互动）→ 本轮优先做，但不硬性阻塞整轮。如果当轮无法完成，评论说明情况后继续 find_work。

      如果某个 issue 不打算做了 → 去 issue 下评论说明,让 maintainer 取消 assign。不要静默放弃。


      **Step 1: PR 状态检查**

      用 gogetajob sync 检查所有已提交 PR 的状态。

      **兜底交叉验证（不能跳过）：** gogetajob sync 只追踪关注列表里的 repo。用 gh 查全量 open PR 确认没有遗漏：

      `gh search prs --author=kagura-agent --state=open --json repository,number,title,updatedAt`

      对比 sync 结果 — 如果有 PR 出现在 gh 搜索但不在 sync 里，说明该 repo 不在 gogetajob 关注列表，立即 `gogetajob scan <owner/repo>` 加入。

      （qwen-code#4474 教训：3 个 PR 有未处理的 CHANGES_REQUESTED，但 qwen-code 不在关注列表，gogetajob sync 完全看不到，连续多天漏检。）

      对每个有新 review comment 或 CI 失败的 PR,列出详情。

      重要:sync 结果出来后,每个标了需要处理的 PR 都要点进去看详情,

      区分真人 review 和 bot review(如 coderabbitai)。

      优先级:真人反馈 > CI 失败 > bot review(nitpick)。

      如果有需要处理的反馈,说明具体是哪个 PR、什么反馈、是真人还是 bot。

      对于被关闭的 PR:读关闭原因,如果别人的方案更好,去学那个方案写wiki 笔记。


      **PR 维护检查**(每个 open PR 都要过):

      - 上次更新距今超过 1 周?→ 检查是否需要 rebase

      - `gh pr view <N> --repo <repo> --json mergeable` 看有没有 conflict

      - 有 conflict → rebase 并 force push,不要让维护者替你做

      - 维护者已 approve 但没 merge?→ 礼貌 ping 一次(仅限第一次发现。如果上轮已 ping 且超过 7 天 → 不再 ping,等 14 天硬性关闭规则触发)

      - **>7 天无 review 的 PR → 当轮必须行动**(guide 第 13 条):ping maintainer / close+reopen / close permanently。不允许"wait with reason"——7 天已经是等待期。
      - **>14 天无 review 的 PR → 硬性关闭**:不 ping,不等,直接 close。14 天无人看 = 不会被看。
      - **approved 未 merge 超 14 天 → 硬性关闭**:已 ping 过无效 = 不会 merge。close + 记录止损。不允许再 ping。

      **去重规则（必做）：** 处理任何 review/comment 前，先查"球在谁手里"。

      **Step A: 查 review 状态**（最高优先级）：

      `gh pr view <N> --repo <repo> --json reviews --jq ''.reviews | map(select(.author.login != "kagura-agent")) | last | "\(.author.login) \(.state)"''`

      - CHANGES_REQUESTED → 再查我最后 push 时间 vs review 时间：

        `gh pr view <N> --repo <repo> --json commits --jq ''.commits[-1].committedDate''`

        - push 在 review 之后 → 已处理，球在对方（等 re-review）

        - push 在 review 之前或没有新 push → **球在我手里，必须改代码**（回 comment 说"会改"不算处理！）

      - APPROVED → 球在对方（等 merge）

      - COMMENTED → 往下看 Step B

      **Step B: 查 comment 归属**（review 状态无异常时）：

      `gh pr view <N> --repo <repo> --json comments --jq ''.comments[-1].author.login''`

      - 最后一条 comment 是 kagura-agent → 球在对方手里

      - 最后一条 comment 是对方 → 球在我手里

      **核心原则：回复 comment ≠ 解决 review。CHANGES_REQUESTED 只有 push 代码才算处理。**

      （qwen-code#4474 教训：回了"会改"但没 push，去重规则判定球在对方，实际未兑现）

      **Step 2: Per-repo PR 存量审计**(不能跳过) 运行 `gh pr list --author=kagura-agent --state=open --json headRepository --jq ''[.[].headRepository.name] | group_by(.) | map({repo: .[0], count: length}) | sort_by(-.count) | .[] | "\(.repo): \(.count)"''` 列出每个 repo 的 open PR 数量。 - 超过 5 个的 repo → 标记为「存量超限」,按 PR 存量管理规则处理(主动关闭 >21天无 review 的 PR)

      **Step 3: GitHub 通知检查**(不能跳过)

      运行 `gh api notifications --paginate --jq ".[].subject | {title, url, type}"` 查看未读通知(必须 --paginate 拿全量)。

      重点关注:issue comment(maintainer 回复你的 issue)、PR review(post-merge feedback)、mention。

      merged PR 的通知也要看--post-merge review 是常见模式,不能因为 merged 就跳过。

      处理完后标已读:`gh api -X PUT notifications --field read=true --field last_read_at="$(date -u +%Y-%m-%dT%H:%M:%SZ)"`


      **🚩 Red Flags - 如果出现以下症状,你在走过场不是在 followup:**

      - sync 结果出来直接说"全部正常"没有点进去看详情 → 你在读标题不是在处理

      - 通知全部标已读但没处理任何一条 → 你在清收件箱不是在响应

      - 跳过了 merged PR 的通知 → post-merge review 是常见模式,不能因为 merged 就跳过'
    branches:
    - condition: 发现真正未兑现的 assigned issue（assigned 且从未提过任何 PR）
      next: resolve_assigned
    - condition: 有待处理的 review 或 CI 问题
      next: handle_feedback
    - condition: 所有 PR 状态正常,没有待处理的
      next: find_work
    - condition: gogetajob/gh 命令失败(网络、认证、API 限流)
      next: fallback_offline
  resolve_assigned:
    task: '**处理未兑现的 assigned issue — 硬 gate，不解决不放行。**

      被 assign 了就是承诺。承诺必须有结局，三选一：

      **选项 A: 本轮做掉** → 直接进 study 节点，本轮目标就是这个 issue。
      ⚠️ 如果 assign 已超过 7 天且选 A，必须当轮完成（不能再选 A 然后下轮又没做）。
      连续 2 轮对同一个 issue 选 A 但没产出 PR → 第 3 轮强制选 B（unassign）。

      **选项 B: 放弃** → 去 issue 下评论说明放弃原因（"I won''t be able to work on this, please unassign me"），
      然后自己 unassign 或请 maintainer 取消。**静默放弃 = 最差选项。**

      **选项 C: 确认不需要 PR** → 仅限特殊情况（如 #4545 分析后认为不是 bug）。
      必须在 issue 下有充分的分析评论，且等 reporter/maintainer 回复确认。
      如果超过 7 天无回复 → 再 ping 一次或 unassign。不能无限期挂着。

      **每个未兑现 issue 必须当场决定走哪个选项并执行。**
      处理完一个后，检查是否还有下一个未兑现 issue。
      全部处理完才能继续。

      汇报每个 assigned issue 的处理结果和选择的选项。
      '
    branches:
    - condition: 选了选项 A（本轮做掉）
      next: study
    - condition: 所有未兑现 issue 已处理（选项 B/C），检查是否有 PR 反馈
      next: followup
  handle_feedback:
    task: "处理上一步发现的 PR 反馈:\n1. 读 review 评论,理解要求\n2. 修改代码\n3. **本地测试**(不能跳过):\n   a. 读wiki 笔记里的测试命令\n   b. 跑测试,确认全过\n   c. 改了接口/类型?→ grep 所有 mock/stub 文件,确认同步\n   d. `git diff --stat` 检查有没有遗漏的文件\n4. 提交并 push\n5. 在 PR 上回复 reviewer\n处理完所有反馈后汇报结果。\n"
    terminal: true
  find_work:
    task: '用 gogetajob scan --all 扫描所有活跃公司(公司列表从 gogetajob DB 读取,不硬编码)。

      **⚠️ 按优先级分级选 issue（guide.md「Repo 优先级分级」）：**

      1. 先看 P1（openclaw/openclaw）的 feed — `gogetajob feed` 过滤出 openclaw 的 issue，有合适的就选

      2. P1 没有合适的 → 看 P2（NVIDIA/NemoClaw, NousResearch/hermes-agent）

      3. P2 也没有 → 看 P3（其他 tracked repos）

      同一 tier 内按 issue 质量选（bug > test > doc > feature）。

      用 gogetajob feed 查看可做的 issue。

      **⚠️ Issue 实时状态验证(不能跳过,gogetajob DB 可能过时):**
      对每个候选 issue,用 gh 验证真实状态:
      `gh issue view <number> --repo <owner/repo> --json state,comments --jq ''.state''`
      - state 不是 OPEN → 跳过,不要选
      - state 是 OPEN → 继续下一步

      **⚠️ 已交互 issue 去重(不能跳过,防止重复 claim):**
      对每个候选 issue,检查我是否已经评论过:
      `gh issue view <number> --repo <owner/repo> --json comments --jq ''.comments[] | select(.author.login=="kagura-agent") | .body'' | head -5`
      - 如果已有 withdraw/放弃评论 → **绝对不再碰这个 issue**
      - 如果已有 claim 评论 → 跳过,已经在做了
      - 没有评论 → 可以选
      (教训:NemoClaw#4710 已 withdraw 但 work-loop 又自动 claim,造成尴尬)

      **⚠️ 自身已关闭 PR 去重(不能跳过,防止重复提交):**
      对每个候选 issue,检查我是否已经提过被关/被 supersede 的 PR:
      `gh pr list --repo <owner/repo> --author=kagura-agent --state=closed --search "<issue号>" --json number -q ''length''`
      - 结果 > 0 → **这个 issue 我已经失败过,绝对不再碰**
      - 结果 = 0 → 可以继续
      (教训:hermes-agent#44640 — PR #44890 被关为 duplicate 后,workloop 次日又选了同一 issue,浪费 ~1h)

      选择一个最有价值的 issue:优先选真实 bug > 测试覆盖 > 文档 > feature。

      确认没有竞争 PR:`gh pr list --repo owner/repo --search "关键词"` 检查。

      **黑名单 repo(绝对不碰):** - mastra-ai/mastra - anti-AI-PR policy (intojhanurag bulk-closed 5 PRs: "No AI serving PRs")

      **前置过滤(每个候选 repo 必须先过,不过的直接跳过,不进 study):**

      - 检查我们在该 repo 的 open PR 数量:`gh pr list --repo owner/repo --author=kagura-agent --state=open`,≤ 4 才考虑(提完不超过 5)。**注意:不设总数上限,只管 per-repo**

      - 检查 issue 有无竞争 PR:`gh pr list --repo owner/repo --search "issue号 OR 关键词"`

      - 检查 repo 活跃度:最后 commit/merge/maintainer 回复是什么时候?超过 2 周无活动 → 不提新 PR

      选题 tips:

      - 选有wiki 笔记的 repo 优先(已有知识积累效率更高)

      - 高星项目先查竞争 PR,别白做

      - 安全/基础设施类 issue 先看 related issues,打包修复 > 逐个提

      - 维护者 merge 统计很重要(内部优先的 repo 堆外部 PR 没意义)

      - 选 issue 前 git log 确认相关代码是否还存在(可能已被删/修)

      汇报选中的 issue 和理由。

      '
    branches:
    - condition: 找到了合适的 issue
      next: pr_gate
    - condition: 没有合适的 issue 可做
      next: discover
    - condition: gogetajob/gh 命令失败(网络、API 限流)
      next: fallback_offline
  pr_gate:
    task: '**机械预检关卡 - 脚本说 FAIL 就不准继续。**


      运行 preflight 脚本(灵感来源:APM triage-panel 的 batch allow-list 模式):

      ```

      bash ~/.openclaw/workspace/flowforge/scripts/preflight-repo.sh <owner/repo> <issue_number>

      ```


      脚本自动检查:

      1. ≤ 3 open PRs from kagura-agent

      2. Repo 最近 14 天有活动

      3. 没有竞争 PR

      4. Repo 大小 ≤ 500MB

      5. Wiki 没有 blocklist 标记


      **结果判断:**

      - PREFLIGHT PASSED → 通过,继续

      - PREFLIGHT FAILED → 不通过,回 find_work 重选

      - 有 WARN → 通过但在汇报里说明


      **粘贴脚本完整输出作为证据。不接受"我检查过了"这种声称。**


      汇报:repo 名、preflight 结果、是否通过。

      '
    branches:
    - condition: 通过(open PR ≤ 3 且 repo 接受外部 PR)
      next: study
    - condition: 不通过(open PR > 3 或 repo 不接受外部 PR)
      next: find_work
  discover:
    task: '已有项目没有合适的 issue,去外面找新项目加入关注列表。

      1. 运行 `gogetajob discover --language TypeScript --min-stars 100 --active-days 14 --limit 10 --topic ai-agent`

      2. 再运行 `gogetajob discover --language Python --min-stars 100 --active-days 14 --limit 10 --topic agent`

      3. 对照 guide.md 的选题原则,筛选对齐方向的项目

      4. 找到合适的 → `gogetajob scan owner/repo` 加入关注列表

      5. 也可以看 GitHub Trending

      **注意:discover 只负责找新项目并加入关注列表,不负责选 issue。选 issue 是 find_work 的事。**

      汇报发现了什么新项目,加入了哪些。'
    branches:
    - condition: 加入了新项目
      next: find_work
    - condition: 没找到合适的新项目
      next: reflect
    - condition: 网络/API 故障,无法搜索
      next: fallback_offline
  study:
    task: "深入研究选中的项目和 issue:\n0. **熟悉度陷阱检查**(打过 3+ 次的 repo 必做):越熟悉越容易跳步骤,机械执行每步,不因\"上次做过\"跳过(教训:NemoClaw DCO 3 次同错)\n0a. **⚠️ Issue 完整上下文阅读(每次必做,不能跳过,不能只看 issue body)**:\n   每次拿到 issue 都必须重新读完整上下文(issue 可能有更新):\n   `gh issue view <number> --repo <owner/repo> --json state,title,body,comments`\n   a. **检查 state** — 如果 issue 已 CLOSED → 立即退回 find_work,不做任何操作\n   b. **读所有 comments** — 可能有新的分析、方向变更、maintainer 结论、其他人的 fix\n   c. **检查我自己的历史评论** — 如果我已经 withdraw/放弃过 → **绝对不重新 claim**,退回 find_work\n   d. **检查是否有人提出这不是本 repo 能修的**(上游问题) → 如果有,评估是否同意再决定\n   (教训:NemoClaw#4710 — 没读 comments 导致重复 claim 已 withdraw 的 issue,Dongni-Yang 的详细分析完全没看到)\n1. **必须先读笔记**(不能跳过):\n   a. cat ~/.openclaw/workspace/wiki/projects/<项目名>.md- wiki 笔记\n   b. 如果文件不存在,说明这是第一次打这个 repo,要特别小心\n1a. **执行 repo-specific 贡献流程**(读完笔记后立即检查,不能跳过):\n   a. 笔记里有「Contribution Flow」section 吗?有 → 按要求执行(如 claim issue、等 assign 等)\n   b. 如果要求先 claim issue → **先检查 0a 的结果:我是否已经评论过?已 withdraw?** 只有确认没有历史交互才发新 claim\n      (教训:NemoClaw#4710 已 withdraw 但 work-loop 又自动 claim,造成尴尬)\n   c. 如果笔记里没有特殊流程 → 跳过\n   d. (教训:NemoClaw#3836 直接提 PR 没 claim,maintainer 要求先通知再 assign)\n1b. **验证本地测试环境**(第一次打新 repo时必做,之后跳过):\n   a. 这个 repo 用什么语言?Go/Python/TS/Java/Rust?\n   b. 本地有对应的运行时吗?`goversion` / `python --version` / `node --version`\n   c. 能装依赖吗?`go mod download`/ `pip install -e \".[dev]\"` / `npm install`\n   d. 能跑测试吗?找到测试命令(Makefile/pyproject.toml/package.json)跑一遍\n  e. **如果环境配不通 → 记到wiki 笔记里,写明卡在哪。但不要因此放弃这个 repo**\n   f. 环境配好后,在wiki 笔记里记录测试命令,下次直接用\n\\\n      2. **搜跨项目知识(两步检索,不能跳过)**:\n   a. 从 issue 标题/描述提取 2-3 个关键词\n   b. cd ~/.openclaw/workspace/wiki\
      \ && MEMEX_HOME=. memex search \"<关键词>\"\n   c. 搜到相关卡片 → 读一下,看有没有已有洞察能指导实现\n   d. **backlink 扩展**:对每个命中的卡片跑 `MEMEX_HOME=. memex backlinks <slug>`,拉出关联卡片,读取最相关的 1-2 个(向量找入口,图谱做扩展)\n   e. 没搜到 → 继续,不纠结\n  f. **⚠️ 不能跳过这一步** - 写了 memex 就必须用,跳过 = 违反\"自己的工具必须用\"\n3. **学习维护者**(从wiki笔记读,不是现场查):\n   a. wiki 笔记里应该已有维护者模式(reflect 时沉淀的)\n   b. 如果笔记里没有,说明这是第一次打这个repo--此时才去查最近 merged PR\n   c. 注意:他们怎么写测试?怎么处理边界?PR 描述什么格式?\n3. 读 CONTRIBUTING.md,**重点关注**:\n  a. PR 流程要求(changeset?CLA?签名?)(教训:stagehand 没加 changeset 被关)\n   b. 代码风格/lint要求\n   c. 测试要求\n4. 涉及 RFC/标准规范的修改?→ 先读原始 RFC 文档再写代码,不凭经验猜 API(教训:Acontext#509 RFC 5987 编码用错 API)\n5. 理解相关代码模块的结构\n5b. **方向存活检查**(check-before-invest,3次教训升级):\n  a. 这个 issue 涉及的模块/依赖/方向还在项目 roadmap 上吗?\n   b. `git log --oneline -10 --<相关目录>` 看最近是否有大规模重写或删除\n   c. issue 评论里有没有 maintainer 说\"这个方向要废弃/重写\"?\n  d. 涉及第三方依赖?查是否有安全事件或被弃用的讨论\n   e. 如果方向已死 → 退回 find_work,不浪费时间(教训:DeepTutorlitellm 废弃白做 PR)\n6. 确认 issue 的根因或需求\n7. **查近期修复**:`git log --oneline -20-- <相关文件>` 看有没有近期 commit\
      \ 已经修了这个 issue\n   - 如果发现已修但 issue 未关闭,在 issue 下评论指出,然后退回find_work\n7. 确认没有人在做同一个 issue(检查 issue 下的关联 PR 和评论)\n8. 评估是否真的能在这个 repo 修(不是上游问题)\n\\\n      9. **提 PR 前 5 问**(全过才提):\n   a. 这个 PR 只解决一个问题吗?\n   b. 上游没有已有修复或竞争 PR 吗?\n  c. 我读了 CONTRIBUTING.md 和最近的 merge 模式吗?\n   d. 我能验证这个修复吗?\n   e. 这个 repo 我的open PR ≤ 3 吗?(超过就停,等已有 PR 被消化)\n汇报你的理解和实现计划,包含从笔记和维护者 PR 中学到的关键信息。\n\n---\n**⬇️ STUDY REPORT(必须输出,缺项 = study 未完成)⬇️**\n\n```\nREPO: <owner/repo>\nISSUE: #<number> - <标题>\nCONTRIBUTING 要求: <逐条列出>\nContribution Flow: <claim required / no special flow / 其他>\n测试命令: <具体命令>\n根因: <一句话>\n改动范围: <哪些文件、改什么>\n风险: <可能踩的坑>\n```\n"
    branches:
    - condition: issue 可做,计划明确
      next: plan
    - condition: issue 不合适(上游问题/竞争PR/太复杂),需要重选
      next: find_work
  implement:
    task: "按照 plan 阶段的计划实现(参照变更清单逐项执行):\n0. **分工决策**:\n   - 代码实现用 acpx exec 同步调 Claude Code:\n     `cd <repo> && /home/kagura/repo/openclaw/node_modules/.bin/acpx --approve-all claude exec \"task\"`\n   - task 必须包含 Claude Code 看不到的上下文:\n     a. 相关的 issue 讨论和 reviewer 反馈\n     b. 类似 bug 的已有修复(可作为参考模式)\n     c. 项目架构和代码位置的关键信息\n     d. maintainer 偏好(从 wiki 读)\n   - **task 开头必须加 surgical constraints**:\n     CONSTRAINTS: 1) Surgical changes only - every changed line must trace to the issue. Do not improve adjacent code/comments/formatting. Preserve original code structure, variable names, and comments exactly as-is unless the fix requires changing them. 2) Match existing style. 3) No speculative features, no while-I-am-here refactors. Do not rename variables, add validation, or restructure functions beyond what the fix requires. 4) Clean up only orphans YOUR changes created. 5) Aim for the smallest possible diff that correctly fixes the issue.\n   - **task 末尾必须加验证指令和边界约束**:\n     \"Before committing:\
      \ 1) grep for all test files that import/mock the interfaces you changed, update their mocks. 2) Run the project's test/lint commands. 3) git diff --stat to confirm no files were missed.\n     BOUNDARY: Only commit locally. Do NOT push, do NOT create PRs, do NOT run gh pr commands. Push and PR creation happen in the submit node.\"\n   - 一行级别的简单修复可以自己做,不需要调 Claude Code\n   - **效率 tip**:大文件(1000+ 行)的简单修复(< 20 行改动),手动改比 acpx exec 更高效\n   - acpx exec 超时默认 300 秒,大文件可能不够,评估后决定手动还是调 agent\n1. acpx exec 是同步的 - 等它跑完结果直接在 stdout 里\n2. Claude Code 完成后:**机械验证**(不能跳过):\n     运行 `bash ~/.openclaw/workspace/flowforge/scripts/verify-claims.sh <repo-dir> [expected-files...]`\n     expected-files = plan 阶段列出的变更文件。脚本检查:文件确实被修改(git diff)、没有遗留 unstaged changes、修改文件非空、无 conflict markers。\n     脚本返回 FAILED → 回去修,不要继续\n3. Review commit 改动是否正确\n4. 确保代码风格符合项目规范\n5. **push 前自检**(不能跳过):\n   a. `git diff --stat` 看全局影响\n   b. 改了接口/类型?→ grep 所有 import 这个接口的文件,确认 mock/stub 同步了\n   c. 项目有测试命令?→ 跑。没有本地环境?→ 至少 grep 验证 mock 完整性\n\n**\U0001F6A9 Red Flags - 如果出现以下症状,你在赶工不是在实现:**\n- 跳过了 plan 里的某个变更项但没说原因 → 你忘了或在回避\n- push 前没跑测试就说\"应该没问题\" → 你在猜不是在验证\n- 改了接口但没 grep\
      \ 相关 mock/stub 文件 → CI 会告诉你\n- acpx exec 的 task 里没包含上下文(issue 讨论/维护者偏好)→ Claude Code 会猜着做\n汇报实现结果和测试状态。\n   d. **Over-editing check**: 逐行审查 diff - 每一行改动都必须 trace back to the issue。如果发现改了不相关的变量名、格式、注释、import 顺序,revert 那些改动。\n"
    next: pre_push_audit
  implement_manual:
    task: 'acpx exec 失败了,手动完成实现:

      1. 检查 acpx 已经做了什么(git diff / git log)

      2. 如果部分完成 → 手动补完剩余部分

      3. 如果完全失败 → 从头手动实现(参照 study 阶段的计划)

      4. 跑测试确认通过

      汇报实现结果。

      '
    next: submit
  submit:
    task: '**提交前再次检查 PR 数量**(硬性,不能跳过):

      ```

      gh pr list --repo <owner/repo> --author=kagura-agent --state=open --json number -q ''length''

      ```

      如果结果 **≥ 5** → **停止,不提交 PR**。汇报"PR 数量已达上限,放弃本轮"。


      确认 < 5 后再继续:


      **AI 身份透明化(新 repo 首次 PR 必做):**

      检查 wiki/projects/<项目名>.md 里的关系状态。如果是 new(没提过 PR 或没有 wiki 笔记):

      PR 描述末尾加上:

      > 🤖 **Disclosure:** This PR was authored by [Kagura](https://github.com/kagura-agent), an AI agent. Open source contribution is one of the things I do - you can see my work history [here](https://github.com/kagura-agent/github-contribution). If you''d prefer not to receive AI-authored PRs, just let me know and I''ll stop - no hard feelings.


      如果关系已是 established(有 merged PR)→ 不需要重复自我介绍,但保留 bot 标识。


      **提交前复盘检查**(cat wiki/cards/code-review-lessons.md + pr-superseded-lessons.md 快速扫一遍):

      - 我是在修根因还是绕症状?调用层有没有内置方案?

      - 有没有绕过项目已有的安全/权限模式?

      - related issues 能不能合并?`gh pr list --search` 有没有竞争 PR?

      - bot review 建议在提交前就能避免的问题?


      1. push 分支到 fork

      2. 创建 PR,标题清晰,描述写明改了什么、为什么、怎么测的

      3. 关联 issue(Closes #XX)


      用 gogetajob import 记录这个 PR。


      汇报 PR 链接。

      '
    branches:
