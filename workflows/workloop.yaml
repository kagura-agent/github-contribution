    terminal: true
  plan:
    task: '**Plan-first phase** - 写出具体实现计划再动手写代码。

      (灵感来源:Blueprint plan-then-code 分离模式。Planning 和 coding 是不同的 agent skill。)


      基于 study 阶段的理解,产出一份结构化计划:


      1. **变更清单**:列出要改的文件和函数,每个写一句话说明改什么

      2. **实现方法**:用什么方法解决?有没有已有的 pattern 可以参考(从 wiki 笔记或 memex 搜到的)?

      3. **边界情况**:这个改动可能影响什么?有没有 ripple effect?

      4. **测试策略**:怎么验证?改哪些测试?需要加新测试吗?

      5. **风险点**:什么可能出错?maintainer 可能不同意什么?


      **判断标准**:

      - 一行修复(typo、import、配置)→ 计划可以很短,2-3 句话

      - 多文件改动 / 涉及接口变更 → 必须详细列出每个文件的变更

      - 不确定的地方用 `[?]` 标记,在 implement 时优先验证


      **防 supersede 检查**(过一遍 wiki/cards/pr-superseded-lessons.md 检查清单 Phase 2+3):

      - 我在修根因还是绕症状?能否在源头拦截?

      - Scope 是否最小?只影响一个 provider/platform 就只改那里

      - 保持向后兼容 defaults?新行为 opt-in?

      - 测试策略覆盖 happy path + error/teardown path?

      - CLI fix 测了所有语法变体?docs 同步了?


      汇报计划。如果写计划过程中发现 issue 比想象的复杂或方向有问题,可以退回 find_work。

      '
    branches:
    - condition: 计划明确,可以开始实现
      next: plan_review
    - condition: 发现问题,需要重选
      next: find_work
  plan_review:
    task: "**Independent Plan Review Gate** - 不允许自评审,必须用 subagent 独立评审计划。\n(灵感来源:GenericAgent mandatory subagent review gate - 分离 planning 和 validation 角色。)\n\n**步骤:**\n1. 把 plan 阶段产出的计划(变更清单 + 实现方法 + 测试策略)整理为简洁文本\n2. spawn 一个 subagent(mode=run),给它以下指令:\n   ```\n   你是一个代码审查员。评审以下实现计划,给出 1-10 分并附简短理由。\n   评审维度:\n   - Scope 是否最小化?有没有不必要的额外改动?\n   - 是否在修根因而非绕症状?\n   - 测试策略是否覆盖了核心变更?\n   - 有没有明显的风险/遗漏?\n   - 是否符合 maintainer 偏好(如果已知)?\n   \n   如果分数 < 7,指出具体问题。\n   如果分数 >= 7,回复 APPROVED。\n   ```\n3. subagent 只看到计划文本,不看 study/context - 这样强制独立判断\n4. **结果处理:**\n   - APPROVED (>=7) → 继续到 implement\n   - NOT APPROVED (<7) → 根据反馈修改计划,回 plan 重来\n\n**⚠️ 不允许跳过这一步。** 即使计划看起来很简单(一行修复除外--如果 plan 阶段已说明是 trivial fix,可以直接过)。\n自己觉得\"这个计划没问题不需要审\"= 你在自评审 = 违反规则。\n"
    branches:
    - condition: Subagent APPROVED (score >= 7)
      next: implement
    - condition: Subagent NOT APPROVED (score < 7),需要修改计划
      next: plan
  pre_push_audit:
    task: '**Default-FAIL 验证关卡** - 证据必须以文件形式存在,不接受口头声称。

      (灵感来源:Anthropic cwc-long-running-agents Default-FAIL contract + thClaws /goal 系统)


      核心原则:所有标准起始为 FALSE,只有 record 了非空证据文件才能翻为 TRUE。

      这不是"请粘贴输出"--是"证据文件必须存在且非空,否则脚本 exit 1"。


      **Step 1: 收集证据文件**(如果 implement 阶段没做完)


      ```bash

      # 如果 implement 阶段已经 init 了 DFG_DIR 并 record 了所有证据,跳到 Step 2

      # 否则现在补:

      DFG_DIR=/tmp/dfg-$(ls -td /tmp/dfg-* 2>/dev/null | head -1 | xargs basename)


      # 1. verify-claims

      bash ~/.openclaw/workspace/flowforge/scripts/verify-claims.sh <repo-dir> 2>&1 | tee /tmp/vc-out.txt

      bash ~/.openclaw/workspace/flowforge/scripts/default-fail-gate.sh record $DFG_DIR verify-claims /tmp/vc-out.txt


      # 2. test output

      <test-command> 2>&1 | tee /tmp/test-out.txt

      bash ~/.openclaw/workspace/flowforge/scripts/default-fail-gate.sh record $DFG_DIR test-output /tmp/test-out.txt


      # 3. diff-stat

      git diff --stat HEAD~1 2>&1 | tee /tmp/diffstat.txt

      bash ~/.openclaw/workspace/flowforge/scripts/default-fail-gate.sh record $DFG_DIR diff-stat /tmp/diffstat.txt


      # 4. interface check

      echo ''No interface changes'' > /tmp/iface.txt  # or: grep -r ''import.*MyInterface'' . > /tmp/iface.txt

      bash ~/.openclaw/workspace/flowforge/scripts/default-fail-gate.sh record $DFG_DIR interface-check /tmp/iface.txt

      ```


      **Step 2: 运行 Default-FAIL gate verify**


      ```bash

      bash ~/.openclaw/workspace/flowforge/scripts/default-fail-gate.sh verify $DFG_DIR

      ```


      - ALL PASSED → 通过,去 submit

      - BLOCKED → 哪个 criterion 是 FALSE 就补哪个,不通过


      **Step 3: plan 对照**

      plan 阶段列了 N 个变更项,逐项打勾 ✅ 或说明为什么跳过。




      **Step 4: Fresh-Context Review**(灵感来源:cwc Fresh-context evaluator)


      Builder 不应给自己的代码打分。用独立 agent 从干净上下文审查 diff:


      ```bash

      bash ~/.openclaw/workspace/flowforge/scripts/fresh-context-review.sh <repo-dir> <base-ref>

      ```


      - PASS → 继续

      - NEEDS_WORK → 读 findings,判断是否需要修(HIGH 必须修,MEDIUM 判断,LOW 可记录不修)

      - 修完后重新跑 review 直到 PASS


      **判定规则:**

      - gate verify 返回 ALL PASSED + fresh-context review PASS + plan 对照完整 → 通过

      - gate verify 返回 BLOCKED → 不通过,回 implement 补证据

      - "应该没问题""测试太慢跳过了""改动很小不需要测" → 不通过

      '
    branches:
    - condition: 所有证据齐全,验证通过
      next: submit
    - condition: 证据不足,需要补充
      next: implement
  gradient_gate:
    task: "**梯度提取验证门**(结构性强制,不可跳过)\n\n检查 beliefs-candidates.md 在本轮是否被修改:\n```\ngit -C ~/.openclaw/workspace diff HEAD -- beliefs-candidates.md | head -20\n```\n\n如果有 diff(新增了 gradient 条目)→ 通过,继续。\n如果没有 diff → **你跳过了 reflect 里的梯度提取步骤。现在补写。**\n\n**⚠️ 必须使用 add-gradient.sh 写入**(统一入口,自动去重 + JSONL 日志):\n```\nbash ~/.openclaw/workspace/tools/add-gradient.sh \\\n  --gradient \"具体的行为级教训\" \\\n  --pattern \"pattern-name\" \\\n  --source workloop \\\n  --trigger \"什么时候会触发这个问题\" \\\n  --fix \"下次怎么做不同\"\n```\n\n问自己(按优先级):\n1. 这轮哪里卡了?什么假设是错的?\n2. 什么方法有效?可以复用吗?\n3. 选题/工具/沟通有什么改进空间?\n4. 真的什么都没学到?那\"为什么没学到\"本身就是一个 gradient。\n\n写完后 commit:\n```\ncd ~/.openclaw/workspace && git add beliefs-candidates.md && git commit -m \"gradient: <标题>\"\n```\n\n**验证管线健康**(可选,推荐每天第一轮运行一次):\n```\nbash ~/.openclaw/workspace/tools/gradient-stats.sh\n```\n"
    branches:
    - condition: beliefs-candidates.md 已有本轮新增的 gradient
      next: done
    - condition: 补写完成
      next: done
