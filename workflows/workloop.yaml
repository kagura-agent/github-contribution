name: workloop
description: '打工循环 - 每轮先跟进已有工作,再找新活。

  **核心原则:一轮 = 一个 issue = 一个 PR。**

  find_work 选定一个 issue 后,后续所有节点(study、implement、submit、verify、reflect)都围绕这一个 issue。

  不允许在任何节点顺手修其他 bug、提其他 PR、做其他 issue。

  '
start: align
nodes:
  align:
    task: '**读准则**:cat ~/.openclaw/workspace/github-contribution/guide.md - 理解为什么打工、两条腿走路、选题原则。

      这是整轮打工的基调,后续所有步骤都参照这个准则。


      **DNA Preflight**(不能跳过):

      `bash tools/dna-preflight.sh --context workloop --days 3`

      看最近违反过哪些已有规则,记住这些提醒,本轮避免重犯。'
    next: followup
  followup:
    task: '运行 followup 脚本获取结构化 PR/issue 状态：


      ```

      bash ~/.openclaw/workspace/tools/workloop-followup.sh 2>&1

      ```


      读脚本输出的 SUMMARY 和 RECOMMENDED BRANCH，判断走哪个分支。


      **脚本会检查：**

      - 已承诺 issue（assigned 但从未互动的）

      - 所有 open PR 状态（review state、ball ownership、age、conflict）

      - Per-repo PR 数量

      - GitHub 通知


      **对脚本输出中标记为 ACTION NEEDED 的项：**

      - CHANGES_REQUESTED → 球在我手里，必须改代码（回 comment 说"会改"不算处理）

      - HARD_CLOSE → >14d 无 review，直接 close

      - NEEDS_PING → >7d 无 review，ping 一次（但先确认 3 天内没 ping 过）

      - CONFLICT → rebase 并 force push

      - COMMENT → 检查是否需要回复

      - STALE_APPROVED → approved 但 >14d 未 merge，close


      **对被关闭的 PR**:读关闭原因,如果别人的方案更好,去学那个方案写 wiki 笔记。


      **分支判断规则：**

      - 有 UNFULFILLED assigned issue → resolve_assigned

      - 有 ACTION NEEDED 项 → handle_feedback

      - 一切正常 → find_work（不允许在 followup 后结束轮次！）

      '
    branches:
    - condition: 发现真正未兑现的 assigned issue（assigned 且从未提过任何 PR）
      next: resolve_assigned
    - condition: 有待处理的 review 或 CI 问题
      next: handle_feedback
    - condition: 所有 PR 状态正常,没有待处理的
      next: find_work
    - condition: gogetajob/gh 命令失败(网络、认证、API 限流)
      next: fallback_offline
  resolve_assigned:
    task: '**处理未兑现的 assigned issue — 硬 gate，不解决不放行。**

      被 assign 了就是承诺。承诺必须有结局，三选一：

      **选项 A: 本轮做掉** → 直接进 study 节点，本轮目标就是这个 issue。 ⚠️ 如果 assign 已超过 7 天且选 A，必须当轮完成（不能再选 A 然后下轮又没做）。 连续 2 轮对同一个 issue 选 A
      但没产出 PR → 第 3 轮强制选 B（unassign）。

      **选项 B: 放弃** → 去 issue 下评论说明放弃原因（"I won''t be able to work on this, please unassign me"）， 然后自己 unassign 或请 maintainer
      取消。**静默放弃 = 最差选项。**

      **选项 C: 确认不需要 PR** → 仅限特殊情况（如 #4545 分析后认为不是 bug）。 必须在 issue 下有充分的分析评论，且等 reporter/maintainer 回复确认。 如果超过 7 天无回复 → 再 ping
      一次或 unassign。不能无限期挂着。

      **每个未兑现 issue 必须当场决定走哪个选项并执行。** 处理完一个后，检查是否还有下一个未兑现 issue。 全部处理完才能继续。

      汇报每个 assigned issue 的处理结果和选择的选项。 '
    branches:
    - condition: 选了选项 A（本轮做掉）
      next: study
    - condition: 所有未兑现 issue 已处理（选项 B/C），检查是否有 PR 反馈
      next: followup
  handle_feedback:
    task: "处理上一步发现的 PR 反馈:\n1. 读 review 评论,理解要求\n2. 修改代码\n3. **本地测试**(不能跳过):\n   a. 读wiki 笔记里的测试命令\n   b. 跑测试,确认全过\n   c.\
      \ 改了接口/类型?→ grep 所有 mock/stub 文件,确认同步\n   d. `git diff --stat` 检查有没有遗漏的文件\n4. 提交并 push\n5. 在 PR 上回复 reviewer\n处理完所有反馈后汇报结果。\n"
    branches:
    - condition: 有实际需要处理的人类 review 反馈，已修改代码并 push
      next: done
    - condition: 反馈全部是 bot/non-actionable，无需改代码
      next: find_work
  find_work:
    task: '运行 find_work 脚本获取可做的 issue 列表：


      ```

      bash ~/.openclaw/workspace/tools/workloop-find-issue.sh 2>&1

      ```


      读脚本输出的 RECOMMENDED ISSUES 列表。


      **脚本自动完成：**

      - gogetajob scan --all（扫描所有 tracked repos）

      - gogetajob feed（按优先级排序）

      - 批量 gate 过滤（state、已交互、open PR 去重、closed PR 去重、竞争 PR、per-repo 上限）

      - 输出存活候选排名


      **选择规则：**

      - 脚本推荐 #1 → 优先选它，除非有明确理由选别的

      - 优先级：P1(openclaw) > P2(NemoClaw) > P3(其他)

      - 同 tier 内：bug > test > doc > feature

      - 选有 wiki 笔记的 repo 优先（已有知识积累效率更高）


      **如果脚本输出 "NO VIABLE ISSUES"：**

      - 走 discover 分支，找新项目


      **黑名单 repo（绝对不碰）：**

      - mastra-ai/mastra — anti-AI-PR policy


      汇报选中的 issue 和理由。

      '
    branches:
    - condition: 找到了合适的 issue
      next: pr_gate
    - condition: 没有合适的 issue 可做
      next: discover
    - condition: gogetajob/gh 命令失败(网络、API 限流)
      next: fallback_offline
  pr_gate:
    task: '**机械预检关卡 - 脚本说 FAIL 就不准继续。**


      运行 preflight 脚本(灵感来源:APM triage-panel 的 batch allow-list 模式):

      ```

      bash ~/.openclaw/workspace/flowforge/scripts/preflight-repo.sh <owner/repo> <issue_number>

      ```


      脚本自动检查:

      1. ≤ 3 open PRs from kagura-agent

      2. Repo 最近 14 天有活动

      3. 没有竞争 PR

      4. Repo 大小 ≤ 500MB

      5. Wiki 没有 blocklist 标记


      **结果判断:**

      - PREFLIGHT PASSED → 通过,继续

      - PREFLIGHT FAILED → 不通过,回 find_work 重选

      - 有 WARN → 通过但在汇报里说明


      **粘贴脚本完整输出作为证据。不接受"我检查过了"这种声称。**


      汇报:repo 名、preflight 结果、是否通过。

      '
    branches:
    - condition: 通过(open PR ≤ 3 且 repo 接受外部 PR)
      next: stale_pr_check
    - condition: 不通过(open PR > 3 或 repo 不接受外部 PR)
      next: find_work
  stale_pr_check:
    task: '**Stale PR Early Detection — 在 study/plan 之前检查是否已有 PR，避免浪费 plan-review subagent。**

      (2026-07-23 gradient: workloop #6852 NemoClaw#7226 stale-pr-fast-path 在 implement 阶段才触发，
      但 plan-review subagent 已经白跑了一整轮。前置检查消除这个浪费。)

      运行:
      ```
      bash tools/stale-pr-check.sh <owner/repo> <issue-number>
      ```

      **退出码判断:**
      - Exit 10 → 我的 PR 已存在且 CI 绿 → **直接 fast-path 到 verify**，跳过 study+plan+implement
      - Exit 11 → 我的 PR 存在但 CI 红 → 跳过 study+plan，进 implement fix mode
      - Exit 0 → 无已有 PR → 正常流程，继续 study

      汇报: 是否有已有 PR、CI 状态、走哪条分支。
      '
    branches:
    - condition: Exit 10 — PR 存在且 CI 绿，fast-path
      next: verify
    - condition: Exit 11 — PR 存在但 CI 红，需修复
      next: implement
    - condition: Exit 0 — 无已有 PR，正常流程
      next: study
  discover:
    task: '已有项目没有合适的 issue,去外面找新项目加入关注列表。

      1. 运行 `gogetajob discover --language TypeScript --min-stars 100 --active-days 14 --limit 10 --topic ai-agent`

      2. 再运行 `gogetajob discover --language Python --min-stars 100 --active-days 14 --limit 10 --topic agent`

      3. 对照 guide.md 的选题原则,筛选对齐方向的项目

      4. 找到合适的 → `gogetajob scan owner/repo` 加入关注列表

      5. 也可以看 GitHub Trending

      **注意:discover 只负责找新项目并加入关注列表,不负责选 issue。选 issue 是 find_work 的事。**

      汇报发现了什么新项目,加入了哪些。'
    branches:
    - condition: 加入了新项目
      next: find_work
    - condition: 没找到合适的新项目
      next: reflect
    - condition: 网络/API 故障,无法搜索
      next: fallback_offline
  study:
    task: "深入研究选中的项目和 issue:\n0. **熟悉度陷阱检查**(打过 3+ 次的 repo 必做):越熟悉越容易跳步骤,机械执行每步,不因\"上次做过\"跳过(教训:NemoClaw DCO 3 次同错)\n0a. **⚠️\
      \ Issue 完整上下文阅读(每次必做,不能跳过,不能只看 issue body)**:\n   每次拿到 issue 都必须重新读完整上下文(issue 可能有更新):\n   `gh issue view <number> --repo\
      \ <owner/repo> --json state,title,body,comments`\n   a. **检查 state** — 如果 issue 已 CLOSED → 立即退回 find_work,不做任何操作\n \
      \  b. **读所有 comments** — 可能有新的分析、方向变更、maintainer 结论、其他人的 fix\n   c. **检查我自己的历史评论** — 如果我已经 withdraw/放弃过 → **绝对不重新 claim**,退回\
      \ find_work\n   d. **检查是否有人提出这不是本 repo 能修的**(上游问题) → 如果有,评估是否同意再决定\n   (教训:NemoClaw#4710 — 没读 comments 导致重复 claim 已\
      \ withdraw 的 issue,Dongni-Yang 的详细分析完全没看到)\n1. **必须先读笔记**(不能跳过):\n   a. cat ~/.openclaw/workspace/wiki/projects/<项目名>.md-\
      \ wiki 笔记\n   b. 如果文件不存在,说明这是第一次打这个 repo,要特别小心\n1a. **执行 repo-specific 贡献流程**(读完笔记后立即检查,不能跳过):\n   a. 笔记里有「Contribution\
      \ Flow」section 吗?有 → 按要求执行(如 claim issue、等 assign 等)\n   b. 如果要求先 claim issue → **先检查 0a 的结果:我是否已经评论过?已 withdraw?**\
      \ 只有确认没有历史交互才发新 claim\n      (教训:NemoClaw#4710 已 withdraw 但 work-loop 又自动 claim,造成尴尬)\n   c. 如果笔记里没有特殊流程 → 跳过\n   d.\
      \ (教训:NemoClaw#3836 直接提 PR 没 claim,maintainer 要求先通知再 assign)\n1b. **验证本地测试环境**(第一次打新 repo时必做,之后跳过):\n   a. 这个 repo 用什么语言?Go/Python/TS/Java/Rust?\n\
      \   b. 本地有对应的运行时吗?`goversion` / `python --version` / `node --version`\n   c. 能装依赖吗?`go mod download`/ `pip install -e\
      \ \".[dev]\"` / `npm install`\n   d. 能跑测试吗?找到测试命令(Makefile/pyproject.toml/package.json)跑一遍\n  e. **如果环境配不通 → 记到wiki\
      \ 笔记里,写明卡在哪。但不要因此放弃这个 repo**\n   f. 环境配好后,在wiki 笔记里记录测试命令,下次直接用\n\\\n      2. **搜跨项目知识(两步检索,不能跳过)**:\n   a. 从 issue\
      \ 标题/描述提取 2-3 个关键词\n   b. cd ~/.openclaw/workspace/wiki && MEMEX_HOME=. memex search \"<关键词>\"\n   c. 搜到相关卡片 → 读一下,看有没有已有洞察能指导实现\n\
      \   d. **backlink 扩展**:对每个命中的卡片跑 `MEMEX_HOME=. memex backlinks <slug>`,拉出关联卡片,读取最相关的 1-2 个(向量找入口,图谱做扩展)\n   e. 没搜到 →\
      \ 继续,不纠结\n  f. **⚠️ 不能跳过这一步** - 写了 memex 就必须用,跳过 = 违反\"自己的工具必须用\"\n3. **学习维护者**(从wiki笔记读,不是现场查):\n   a. wiki 笔记里应该已有维护者模式(reflect\
      \ 时沉淀的)\n   b. 如果笔记里没有,说明这是第一次打这个repo--此时才去查最近 merged PR\n   c. 注意:他们怎么写测试?怎么处理边界?PR 描述什么格式?\n3. 读 CONTRIBUTING.md,**重点关注**:\n\
      \  a. PR 流程要求(changeset?CLA?签名?)(教训:stagehand 没加 changeset 被关)\n   b. 代码风格/lint要求\n   c. 测试要求\n4. 涉及 RFC/标准规范的修改?→ 先读原始\
      \ RFC 文档再写代码,不凭经验猜 API(教训:Acontext#509 RFC 5987 编码用错 API)\n5. 理解相关代码模块的结构\n5b. **方向存活检查**(check-before-invest,3次教训升级):\n\
      \  a. 这个 issue 涉及的模块/依赖/方向还在项目 roadmap 上吗?\n   b. `git log --oneline -10 --<相关目录>` 看最近是否有大规模重写或删除\n   c. issue 评论里有没有\
      \ maintainer 说\"这个方向要废弃/重写\"?\n  d. 涉及第三方依赖?查是否有安全事件或被弃用的讨论\n   e. 如果方向已死 → 退回 find_work,不浪费时间(教训:DeepTutorlitellm 废弃白做\
      \ PR)\n6. 确认 issue 的根因或需求\n7. **查近期修复**:`git log --oneline -20-- <相关文件>` 看有没有近期 commit 已经修了这个 issue\n   - 如果发现已修但 issue\
      \ 未关闭,在 issue 下评论指出,然后退回find_work\n7. **竞争 PR 结构化检查（不能跳过）**：\n   `bash tools/competing-pr-check.sh <owner/repo> <issue-number>`\n\
      \   脚本退出 1 → 退回 find_work，不浪费 study 时间。退出 0 → 继续。\n8. 评估是否真的能在这个 repo 修(不是上游问题)\n\\\n      9. **提 PR 前 5 问**(全过才提):\n\
      \   a. 这个 PR 只解决一个问题吗?\n   b. 上游没有已有修复或竞争 PR 吗?\n  c. 我读了 CONTRIBUTING.md 和最近的 merge 模式吗?\n   d. 我能验证这个修复吗?\n   e. 这个\
      \ repo 我的open PR ≤ 3 吗?(超过就停,等已有 PR 被消化)\n汇报你的理解和实现计划,包含从笔记和维护者 PR 中学到的关键信息。\n\n---\n**⬇️ STUDY REPORT(必须输出,缺项 = study\
      \ 未完成)⬇️**\n\n```\nREPO: <owner/repo>\nISSUE: #<number> - <标题>\nCONTRIBUTING 要求: <逐条列出>\nContribution Flow: <claim required\
      \ / no special flow / 其他>\n测试命令: <具体命令>\n根因: <一句话>\n改动范围: <哪些文件、改什么>\n风险: <可能踩的坑>\n```\n"
    branches:
    - condition: issue 可做,计划明确
      next: plan
    - condition: issue 不合适(上游问题/竞争PR/太复杂),需要重选
      next: find_work
  implement:
    task: "按照 plan 阶段的计划实现(参照变更清单逐项执行):\n**⚡ Stale PR Recovery（implement 前第一步）**：\n`bash tools/stale-pr-check.sh <owner/repo>\
      \ <issue-number>`\n退出 10 → 我的 PR 已存在且 CI 绿 → **直接走 Branch 3 fast-path**，不重做实现。\n退出 11 → 我的 PR 存在但 CI 红 → fix mode，检查\
      \ CI 失败原因并修复，不从头实现。\n退出 0 → 无已有 PR → 继续正常实现流程。\n（解决 workloop 实例卡住后恢复时重复实现的问题。stale-workloop-recovery gradient 2026-06-20。）\n\
      \n**⚠️ 竞争 PR 复查（stale-pr-check exit 0 时必做）**：\n`bash tools/competing-pr-check.sh <owner/repo> <issue-number>`\n退出 1\
      \ → 已被抢先，退回 find_work，不浪费实现时间。\n（高星 repo issue 从 study→implement 可能经过数小时，期间经常被竞争 PR 抢先。hermes#49307 教训。）\n\n0. **分工决策**:\n\
      \   - 代码实现用 acpx exec 同步调 Claude Code:\n     `cd <repo> && /home/kagura/repo/openclaw/node_modules/.bin/acpx --approve-all\
      \ claude exec \"task\"`\n   - task 必须包含 Claude Code 看不到的上下文:\n     a. 相关的 issue 讨论和 reviewer 反馈\n     b. 类似 bug 的已有修复(可作为参考模式)\n\
      \     c. 项目架构和代码位置的关键信息\n     d. maintainer 偏好(从 wiki 读)\n   - **task 开头必须加 surgical constraints**:\n     CONSTRAINTS:\
      \ 1) Surgical changes only - every changed line must trace to the issue. Do not improve adjacent code/comments/formatting.\
      \ Preserve original code structure, variable names, and comments exactly as-is unless the fix requires changing them.\
      \ 2) Match existing style. 3) No speculative features, no while-I-am-here refactors. Do not rename variables, add validation,\
      \ or restructure functions beyond what the fix requires. 4) Clean up only orphans YOUR changes created. 5) Aim for the\
      \ smallest possible diff that correctly fixes the issue.\n   - **task 末尾必须加验证指令和边界约束**:\n     \"Before committing: 1)\
      \ grep for all test files that import/mock the interfaces you changed, update their mocks. 2) Run the project's test/lint\
      \ commands. 3) git diff --stat to confirm no files were missed.\n     BOUNDARY: Only commit locally. Do NOT push, do\
      \ NOT create PRs, do NOT run gh pr commands. Push and PR creation happen in the submit node.\"\n   - 一行级别的简单修复可以自己做,不需要调\
      \ Claude Code\n   - **效率 tip**:大文件(1000+ 行)的简单修复(< 20 行改动),手动改比 acpx exec 更高效\n   - acpx exec 超时默认 300 秒,大文件可能不够,评估后决定手动还是调\
      \ agent\n1. acpx exec 是同步的 - 等它跑完结果直接在 stdout 里\n2. Claude Code 完成后:**机械验证**(不能跳过):\n     运行 `bash ~/.openclaw/workspace/flowforge/scripts/verify-claims.sh\
      \ <repo-dir> [expected-files...]`\n     expected-files = plan 阶段列出的变更文件。脚本检查:文件确实被修改(git diff)、没有遗留 unstaged changes、修改文件非空、无\
      \ conflict markers。\n     脚本返回 FAILED → 回去修,不要继续\n3. Review commit 改动是否正确\n4. 确保代码风格符合项目规范\n5. **push 前自检**(不能跳过):\n\
      \   a. `git diff --stat` 看全局影响\n   b. 改了接口/类型?→ grep 所有 import 这个接口的文件,确认 mock/stub 同步了\n   c. 项目有测试命令?→ 跑。没有本地环境?→\
      \ 至少 grep 验证 mock 完整性\n\n**\U0001F6A9 Red Flags - 如果出现以下症状,你在赶工不是在实现:**\n- 跳过了 plan 里的某个变更项但没说原因 → 你忘了或在回避\n- push 前没跑测试就说\"\
      应该没问题\" → 你在猜不是在验证\n- 改了接口但没 grep 相关 mock/stub 文件 → CI 会告诉你\n- acpx exec 的 task 里没包含上下文(issue 讨论/维护者偏好)→ Claude Code\
      \ 会猜着做\n汇报实现结果和测试状态。\n   d. **Over-editing check**: 逐行审查 diff - 每一行改动都必须 trace back to the issue。如果发现改了不相关的变量名、格式、注释、import\
      \ 顺序,revert 那些改动。\n"
    branches:
    - condition: 竞争 PR 复查失败 — issue 已被修/有竞争 PR merged
      next: find_work
    - condition: 实现完成
      next: pre_push_audit
    - condition: Stale PR fast-path — 我的 PR 已存在且 CI 绿，跳过实现
      next: pre_push_audit
  implement_manual:
    task: 'acpx exec 失败了,手动完成实现:

      1. 检查 acpx 已经做了什么(git diff / git log)

      2. 如果部分完成 → 手动补完剩余部分

      3. 如果完全失败 → 从头手动实现(参照 study 阶段的计划)

      4. 跑测试确认通过

      汇报实现结果。

      '
    next: submit
  submit:
    task: '**提交前再次检查 PR 数量**(硬性,不能跳过):

      ```

      gh pr list --repo <owner/repo> --author=kagura-agent --state=open --json number -q ''length''

      ```

      如果结果 **≥ 5** → **停止,不提交 PR**。汇报"PR 数量已达上限,放弃本轮"。


      确认 < 5 后再继续:


      **AI 身份透明化(新 repo 首次 PR 必做):**

      检查 wiki/projects/<项目名>.md 里的关系状态。如果是 new(没提过 PR 或没有 wiki 笔记):

      PR 描述末尾加上:

      > 🤖 **Disclosure:** This PR was authored by [Kagura](https://github.com/kagura-agent), an AI agent. Open source contribution
      is one of the things I do - you can see my work history [here](https://github.com/kagura-agent/github-contribution).
      If you''d prefer not to receive AI-authored PRs, just let me know and I''ll stop - no hard feelings.


      如果关系已是 established(有 merged PR)→ 不需要重复自我介绍,但保留 bot 标识。


      **提交前复盘检查**(cat wiki/cards/code-review-lessons.md + pr-superseded-lessons.md 快速扫一遍):

      - 我是在修根因还是绕症状?调用层有没有内置方案?

      - 有没有绕过项目已有的安全/权限模式?

      - related issues 能不能合并?`gh pr list --search` 有没有竞争 PR?

      - bot review 建议在提交前就能避免的问题?


      1. push 分支到 fork

      2. 创建 PR,标题清晰,描述写明改了什么、为什么、怎么测的

      3. 关联 issue(Closes #XX)


      用 gogetajob import 记录这个 PR。


      汇报 PR 链接。

      '
    branches:
    - condition: PR 已成功提交
      next: verify
    - condition: PR 数量已达上限,放弃本轮
      next: reflect
  verify:
    task: '**只检查本轮刚提交的那一个 PR,不做任何其他事。**

      等 3-5 分钟,然后:

      1. CI 是否通过?

      2. 有没有自动化 review(CodeRabbit 等)?

      3. 如果 review 有简单修复建议 → 修改并 push 到同一个 PR

      **禁止事项:不创建新 PR,不修复其他 issue,不做本轮 PR 以外的任何工作。**

      汇报本轮 PR 的 CI 和 review 状态。

      '
    branches:
    - condition: CI 通过,review 反馈已处理(或没有反馈)
      next: reflect
    - condition: 有问题需要修改
      next: implement
  reflect:
    task: "反思本轮打工并**更新项目笔记**(不能跳过):\n\n⛔ **Anti-rationalization table:**\n| 借口 | 反驳 |\n| \"PR 很顺利,没什么好反思的\" | 顺利≠没改进空间。有没有更快路径?选题有效吗?\
      \ |\n| \"这 repo 打过了,笔记不用更\" | 每次 PR 有新信号(review 风格、CI、竞争 PR)。3 行够 |\n| \"被关/被 supersede 了,不想看\" | 失败 PR 反思价值 > 成功 PR。写\
      \ why 和 prevention |\n| \"太累了先交了再说\" | 反思是这轮 30% 价值。跳过 = 白做 |\n\n**第一步:更新wiki 笔记**(必须做)\n编辑 ~/.openclaw/workspace/wiki/projects/<项目名>.md,追加:\n\
      - 这次 PR 的结果(merged/pending/closed + 原因)\n- 维护者的 review 风格和偏好(新发现的)\n- **维护者 PR 模式**:他们怎么写测试、处理边界、描述 PR?(下次 study 要读这些)\n\
      - CI/lint/测试的注意事项\n- 踩过的坑\n- 下次打这个 repo 该注意什么\n然后:cd ~/.openclaw/workspace/wiki && git add -A && git commit -m \"update:\
      \ <项目名> wiki notes\" && git push\n\n**第二步:Acontext distillation 反思**\n\n**成功分析**(什么有效):\n- goal: 这轮要做什么?\n- approach:\
      \ 什么方法有效?\n- key_decisions: 哪些选择起了作用?\n- pattern: 可复用的模式(选题策略、代码方法、沟通方式)\n- applies_when: 具体适用条件(哪个项目、什么类型的 issue)\n\
      \n**目标漂移检查 (Ĵ≠J\\*)**:\n- Ĵ(我理解的目标) vs J\\*(实际需要): 一致吗?\n- 有没有\"自信地解决了错误问题\"的迹象?(例:修了不是根因的 bug、优化了没人用的路径、回答了没被问的问题)\n\
      - 来源:GenericAgent 控制论框架——最常见失败模式不是执行差,而是目标估计偏了\n\n**失败分析**(哪里卡了):\n- failure_point: 卡在哪?\n- flawed_reasoning: 错误假设\n\
      - what_should_have_been_done: 正确做法\n- prevention_principle: 怎么防\n\n**沉淀分流**(按性质选最佳载体,所有笔记用 [[双链]] 互引):\n- **项目级 pattern**(跟具体\
      \ repo/maintainer/CI 相关)→ wiki/projects/项目名.md\n  用 [[双链]] 引用相关项目笔记和概念卡片\n  例:NemoClaw CI 慢要先本地 lint、gitclaw maintainer\
      \ 偏好小 PR\n- **跨项目洞察**(多个项目对比出的规律、生态观察)→ memex 卡片\n  写完后:cd ~/.openclaw/workspace/wiki && git add -A && git commit -m\
      \ \"card: 卡片名\" && git push\n  例:TypeScript 项目普遍用 X 测试框架、大 repo 的 review 流程有 Y 共性\n- **行为级 pattern**(跨项目通用的工作方式)→ beliefs-candidates.md(梯度收集,积累够了分流到\
      \ DNA/Workflow/KB)\n  例:选 issue 前查竞争 PR、被 review 先理解再改\n不确定的先放 wiki,重复出现再考虑升级。\n\n**第 2.5 步:强制写 gradient**(不能跳过)\n⚠️\
      \ 每轮打工必须至少写 1 条 gradient 到 beliefs-candidates.md,哪怕很短。\n这不是可选的反思--是管线的输入源。没有输入,beliefs 管线永远空转。\n\n问自己:\n- 这轮哪里卡了?→ 写下来\n\
      - 什么方法有效?→ 写下来\n- 维护者的反馈教了我什么?→ 写下来\n- 选题/工具/流程有什么可以改进?→ 写下来\n\n**使用 add-gradient.sh 写入**(统一入口,自动去重 + JSONL 日志):\n```\n\
      bash ~/.openclaw/workspace/tools/add-gradient.sh \\\n  --gradient '<具体的行为级教训>' \\\n  --pattern '<pattern-name>' \\\n\
      \  --source workloop \\\n  --trigger '<什么时候会触发>' \\\n  --fix '<下次怎么做不同>'\n```\n\n**⛔ 如果你觉得\"这轮没什么好写的\"--这本身就是一个 gradient:你在合理化跳过。写下来。**\n\
      \n**工具检查**:\n- gogetajob、gh、flowforge 等有没有问题?\n- 有 bug → 去工具 repo 提 issue 或自己修\n\n把反思结果记到 memory/YYYY-MM-DD.md。\n\n\
      **第三步:更新贡献准则和工作流**(飞轮闭环)\n回顾 ~/.openclaw/workspace/wiki/github-contribution/guide.md:\n- 这轮贡献有没有新的选题认知?(比如某类项目 merge\
      \ rate 特别低)\n- 发现了新的有效渠道?\n- \"服务到底\"或\"持续扩张\"有边界情况需要细化?\n如果有 → 更新 guide.md\n再回顾 workloop.yaml 本身:流程有没有卡的地方、多余的步骤、缺失的检查?\n\
      如果有 → 更新 github-contribution/workflows/workloop.yaml\n更新后 git commit + push。\n\n**第四步:更新 TODO**(改进点进入待办)\n读 TODO.md「\U0001F528\
      \ GitHub Contribution(精进)」section:\n- 本轮发现工具/流程/策略改进点?→ 加入 TODO\n- 之前的待办已经顺手做完了?→ 删掉\n只放体系改进,不放 PR 状态。\n"
    next: gradient_gate
  fallback_offline:
    task: '网络/API 不可用,无法正常打工。转为离线有效工作:

      1. **整理已有 PR**:读本地 git log,检查有没有未 push 的 commit

      2. **更新 wiki 笔记**:读 wiki/projects/ 下的笔记,补充遗漏的维护者模式、测试命令等

      3. **读代码**:选一个常打的 repo,深读一个模块,写笔记

      4. **整理 beliefs-candidates**:有没有重复 3 次以上但还没升级的 gradient?执行升级

      产出必须有:至少一个文件被修改并 commit。

      '
    next: reflect
  done:
    task: '这一轮工作完成。记录今天的工作到 memory 文件。

      汇报本轮成果。

      '
    terminal: true
  plan:
    task: "**Plan-first phase** - 写出具体实现计划,内置 review gate,一步到位。\n(灵感来源:Blueprint plan-then-code 分离模式 + GenericAgent mandatory\
      \ review gate。)\n(2026-07-07 合并 plan + plan_review:plan_review 作为独立 node 长期卡住,\n根因是 cron session 做完 review 后断裂,advance\
      \ 没跑到。合并后一轮 cron 跑完。)\n\n基于 study 阶段的理解,产出一份结构化计划:\n\n1. **变更清单**:列出要改的文件和函数,每个写一句话说明改什么\n2. **实现方法**:用什么方法解决?有没有已有的\
      \ pattern 可以参考(从 wiki 笔记或 memex 搜到的)?\n3. **边界情况**:这个改动可能影响什么?有没有 ripple effect?\n4. **测试策略**:怎么验证?改哪些测试?需要加新测试吗?\n\
      5. **风险点**:什么可能出错?maintainer 可能不同意什么?\n\n**判断标准**:\n- 一行修复(typo、import、配置)→ 计划可以很短,2-3 句话\n- 多文件改动 / 涉及接口变更 → 必须详细列出每个文件的变更\n\
      - 不确定的地方用 `[?]` 标记,在 implement 时优先验证\n\n**防 supersede 检查**(过一遍 wiki/cards/pr-superseded-lessons.md 检查清单 Phase 2+3):\n\
      - 我在修根因还是绕症状?能否在源头拦截?\n- Scope 是否最小?只影响一个 provider/platform 就只改那里\n- 保持向后兼容 defaults?新行为 opt-in?\n- 测试策略覆盖 happy path\
      \ + error/teardown path?\n- CLI fix 测了所有语法变体?docs 同步了?\n\n---\n\n**Plan Review Gate**(内置,不允许自评审)\n\n计划写完后,立即用 subagent\
      \ 独立评审:\n\n1. 把计划(变更清单 + 实现方法 + 测试策略)整理为简洁文本\n2. spawn 一个 subagent(mode=run),给它以下指令:\n   你是一个代码审查员。评审以下实现计划,给出 1-10\
      \ 分并附简短理由。\n   评审维度: Scope 最小化? 修根因? 测试覆盖? 风险/遗漏? 符合 maintainer 偏好?\n   分数 < 7 → 指出具体问题。分数 >= 7 → 回复 APPROVED。\n3. subagent\
      \ 只看到计划文本,不看 study/context — 强制独立判断\n4. 结果处理:\n   - APPROVED (>=7) → 汇报计划,走 implement\n   - NOT APPROVED (<7) → 根据反馈修改计划,重新\
      \ review(同一轮内循环,不退出 node)\n5. Trivial fix 例外:如果是一行修复(typo/import/config),可以跳过 subagent review\n\n汇报最终计划和 review 分数。如果写计划过程中发现\
      \ issue 比想象的复杂或方向有问题,可以退回 find_work。\n"
    branches:
    - condition: 计划通过 review (APPROVED),可以开始实现
      next: implement
    - condition: 发现问题,需要重选
      next: find_work
  pre_push_audit:
    task: '**Default-FAIL 验证关卡** - 证据必须以文件形式存在,不接受口头声称。

      (灵感来源:Anthropic cwc-long-running-agents Default-FAIL contract + thClaws /goal 系统)


      核心原则:所有标准起始为 FALSE,只有 record 了非空证据文件才能翻为 TRUE。

      这不是"请粘贴输出"--是"证据文件必须存在且非空,否则脚本 exit 1"。


      **Step 1: 收集证据文件**(如果 implement 阶段没做完)


      ```bash

      # 如果 implement 阶段已经 init 了 DFG_DIR 并 record 了所有证据,跳到 Step 2

      # 否则现在补:

      DFG_DIR=/tmp/dfg-$(ls -td /tmp/dfg-* 2>/dev/null | head -1 | xargs basename)


      # 1. verify-claims

      bash ~/.openclaw/workspace/flowforge/scripts/verify-claims.sh <repo-dir> 2>&1 | tee /tmp/vc-out.txt

      bash ~/.openclaw/workspace/flowforge/scripts/default-fail-gate.sh record $DFG_DIR verify-claims /tmp/vc-out.txt


      # 2. test output

      <test-command> 2>&1 | tee /tmp/test-out.txt

      bash ~/.openclaw/workspace/flowforge/scripts/default-fail-gate.sh record $DFG_DIR test-output /tmp/test-out.txt


      # 3. diff-stat

      git diff --stat HEAD~1 2>&1 | tee /tmp/diffstat.txt

      bash ~/.openclaw/workspace/flowforge/scripts/default-fail-gate.sh record $DFG_DIR diff-stat /tmp/diffstat.txt


      # 4. interface check

      echo ''No interface changes'' > /tmp/iface.txt  # or: grep -r ''import.*MyInterface'' . > /tmp/iface.txt

      bash ~/.openclaw/workspace/flowforge/scripts/default-fail-gate.sh record $DFG_DIR interface-check /tmp/iface.txt

      ```


      **Step 2: 运行 Default-FAIL gate verify**


      ```bash

      bash ~/.openclaw/workspace/flowforge/scripts/default-fail-gate.sh verify $DFG_DIR

      ```


      - ALL PASSED → 通过,去 submit

      - BLOCKED → 哪个 criterion 是 FALSE 就补哪个,不通过


      **Step 3: plan 对照**

      plan 阶段列了 N 个变更项,逐项打勾 ✅ 或说明为什么跳过。




      **Step 4: Fresh-Context Review**(灵感来源:cwc Fresh-context evaluator)


      Builder 不应给自己的代码打分。用独立 agent 从干净上下文审查 diff:


      ```bash

      bash ~/.openclaw/workspace/flowforge/scripts/fresh-context-review.sh <repo-dir> <base-ref>

      ```


      - PASS → 继续

      - NEEDS_WORK → 读 findings，**先验证 reviewer 假设再行动**: (1) 对每个 HIGH finding：验证 reviewer 的前提假设是否正确（reviewer 没有完整源码上下文，可能基于错误推断——如把
      sync 函数误判为 async、把内部 API 误当 public API） (2) 假设正确 → 必须修 (3) 假设错误 → 标记 false positive，记录到 gradient，继续 (4) MEDIUM → 判断（验证假设同上）；LOW
      → 可记录不修 (教训: hermes-studio#1998 — reviewer 看到 DB write 就假设 async，实际是 sync function，差点引入不必要的 await 重构)

      - 修完后重新跑 review 直到 PASS（或所有 HIGH findings 已验证为 false positive）


      **判定规则:**

      - gate verify 返回 ALL PASSED + fresh-context review PASS + plan 对照完整 → 通过

      - gate verify 返回 BLOCKED → 不通过,回 implement 补证据

      - "应该没问题""测试太慢跳过了""改动很小不需要测" → 不通过

      '
    branches:
    - condition: 所有证据齐全,验证通过
      next: submit
    - condition: 证据不足,需要补充
      next: implement
  gradient_gate:
    task: "**梯度提取验证门**(结构性强制,不可跳过)\n\n检查 beliefs-candidates.md 在本轮是否被修改:\n```\ngit -C ~/.openclaw/workspace diff HEAD -- beliefs-candidates.md\
      \ | head -20\n```\n\n如果有 diff(新增了 gradient 条目)→ 通过,继续。\n如果没有 diff → **你跳过了 reflect 里的梯度提取步骤。现在补写。**\n\n**⚠️ 必须使用 add-gradient.sh\
      \ 写入**(统一入口,自动去重 + JSONL 日志):\n```\nbash ~/.openclaw/workspace/tools/add-gradient.sh \\\n  --gradient \"具体的行为级教训\" \\\
      \n  --pattern \"pattern-name\" \\\n  --source workloop \\\n  --trigger \"什么时候会触发这个问题\" \\\n  --fix \"下次怎么做不同\"\n```\n\
      \n问自己(按优先级):\n1. 这轮哪里卡了?什么假设是错的?\n2. 什么方法有效?可以复用吗?\n3. 选题/工具/沟通有什么改进空间?\n4. 真的什么都没学到?那\"为什么没学到\"本身就是一个 gradient。\n\n\
      写完后 commit:\n```\ncd ~/.openclaw/workspace && git add beliefs-candidates.md && git commit -m \"gradient: <标题>\"\n```\n\
      \n**验证管线健康**(可选,推荐每天第一轮运行一次):\n```\nbash ~/.openclaw/workspace/tools/gradient-stats.sh\n```\n"
    branches:
    - condition: beliefs-candidates.md 已有本轮新增的 gradient
      next: done
    - condition: 补写完成
      next: done
