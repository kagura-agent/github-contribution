name: workloop-night
description: 下班时间轻量打工 — 只跟进手上的 PR，不开新的
start: dedup_gate
nodes:
  dedup_gate:
    task: |
      **夜间去重门禁（Day 6 carry-forward 修复）**

      快速检查是否有新变化，避免重复执行：
      1. 获取所有 open PR 的最新 review/comment 时间戳：
         `gh search prs --author=kagura-agent --state=open --json number,repository,updatedAt --jq 'sort_by(.number) | map("\(.repository.nameWithOwner)#\(.number):\(.updatedAt)") | join("\n")'`
      2. 读取上次状态文件：`cat /tmp/workloop-night-state.txt 2>/dev/null || echo "no-previous"`
      3. 比较当前状态和上次状态
      4. 将当前状态写入 `/tmp/workloop-night-state.txt`

      如果状态完全相同（没有任何 PR 的 updatedAt 变化）→ 无增量信息，直接跳 done
      如果有变化或没有上次状态 → 继续正常 followup
    branches:
      - condition: 状态与上次完全相同，无增量信息
        next: done_dedup
      - condition: 有变化，或首次运行
        next: followup

  done_dedup:
    task: |
      状态无变化，跳过本轮。不写 memory（避免重复记录）。
    terminal: true

  followup:
    task: |
      **只跟进已有 PR，不找新 issue。**

      **Step 0: 已承诺 issue 检查**（不能跳过）
      被 assign 了 = 承诺了。承诺了没做 = 比没认领还差。

      **排除列表**（已穷尽手段、不再报告）：
      - NVIDIA/NemoClaw#3836 — 4次 unassign 请求无回应，API 403 无法自操作，已关闭跟进

      ```
      gh search issues --assignee=kagura-agent --state=open --json repository,number,title,updatedAt
      ```
      对结果过滤掉排除列表中的 issue 再处理。
      对每个 assigned issue，检查有没有对应的 open PR：
      `gh pr list --repo <owner/repo> --author=kagura-agent --search "<issue号>" --state=open`
      - 有 PR → 已在做，跳过
      - 没有 PR → **未兑现的承诺**，写到 memory/当天日期.md 标注「⚠️ assigned 未兑现」，白天 work-loop 的 resolve_assigned gate 会拦住处理

      **Step 1: PR 状态检查**
      用 gogetajob sync 检查所有已提交 PR 的状态。

      **兜底交叉验证（不能跳过）：** gogetajob sync 只追踪关注列表里的 repo。用 gh 查全量 open PR 确认没有遗漏：
      `gh search prs --author=kagura-agent --state=open --json repository,number,title,updatedAt`
      对比 sync 结果 — 如果有 PR 出现在 gh 搜索但不在 sync 里，说明该 repo 不在 gogetajob 关注列表，立即 `gogetajob scan <owner/repo>` 加入。
      对每个有新 review comment 或 CI 失败的 PR，列出详情。

      **球在谁手里？**（每个 PR 必须先判断）

      Step A（最高优先级）：查 review 状态
      `gh pr view <N> --repo <repo> --json reviews --jq '.reviews | map(select(.author.login != "kagura-agent")) | last | "\(.author.login) \(.state)"'`
      - CHANGES_REQUESTED → 再查我最后 push 时间 vs review 时间：
        `gh pr view <N> --repo <repo> --json commits --jq '.commits[-1].committedDate'`
        - push 在 review 之后 → 已处理，球在对方（等 re-review）
        - push 在 review 之前或没有新 push → **球在我手里，必须改代码**（回 comment 说"会改"不算处理！）
      - APPROVED → 球在对方（等 merge）
      - COMMENTED → 往下看 Step B

      Step B（兜底）：查 comment 归属
      `gh pr view <N> --repo <repo> --json comments --jq '.comments[-1].author.login'`
      - 最后一条 comment 是 kagura-agent → 球在对方手里
      - 最后一条 comment 是对方 → 球在我手里，需要处理

      核心原则：回复 comment ≠ 解决 review。CHANGES_REQUESTED 只有 push 代码才算处理。

      重要：sync 结果出来后，每个标了需要处理的 PR 都要点进去看详情，
      区分真人 review 和 bot review（如 coderabbitai）。
      优先级：真人反馈 > CI 失败 > bot review（nitpick）。

      **PR 维护检查**（每个 open PR 都要过）：
      - 上次更新距今超过 1 周？→ 检查是否需要 rebase
      - `gh pr view <N> --repo <repo> --json mergeable` 看有没有 conflict
      - 有 conflict → rebase 并 force push
      - 维护者已 approve 但没 merge？→ 礼貌 ping 一次

      环境：proxy: export https_proxy=http://127.0.0.1:1083

      汇报 sync 结果。
    branches:
      - condition: 有 PR 收到真人 review 需要代码修改
        next: handle_feedback
      - condition: 有 PR 被关闭/supersede/拒绝（非自己关的），但无需代码修改
        next: reflect
      - condition: 所有 PR 状态正常，没有待处理的
        next: done

  handle_feedback:
    task: |
      处理 PR 反馈：
      1. 读 review 评论，理解要求
      2. 用 Claude Code 修改代码：
         `cd <repo> && /home/kagura/repo/openclaw/node_modules/.bin/acpx --approve-all claude exec "task"`
      3. **本地测试**（不能跳过）：
         a. 读 wiki 笔记里的测试命令
         b. 跑测试，确认全过
         c. `git diff --stat` 检查有没有遗漏的文件
      4. 提交并 push
      5. 在 PR 上回复 reviewer
      处理完所有反馈后汇报结果。
    branches:
      - condition: 还有其他 PR 需要处理
        next: handle_feedback
      - condition: 全部处理完
        next: reflect

  reflect:
    task: |
      反思本轮跟进并更新项目笔记（不能跳过）：

      对每个处理过的 PR：
      1. 维护者的 review 风格和偏好（新发现的）
      2. 踩过的坑
      3. 学到的东西（代码技巧、测试方法、沟通方式）

      **如果有 PR 被关闭/supersede：**
      - 被 supersede → `gh pr view <替代PR>` 读代码，对比我的方案 vs 替代方案，分析差在哪
      - 被 maintainer 直接关闭 → 记录原因，判断是否该继续投入这个 repo
      - 记录到 wiki/projects/<项目名>.md + wiki/cards/pr-superseded-lessons.md（如果有跨项目通用 pattern）

      简要记录到 memory/当天日期.md。
    terminal: true

  done:
    task: |
      晚间跟进完成。所有 PR 状态正常，无需处理。
      简要记录到 memory/当天日期.md。
    terminal: true
